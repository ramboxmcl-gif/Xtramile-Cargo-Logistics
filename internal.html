<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>X‑TRA Mile Internal Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="/firebase.js"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-900 text-white p-4 flex justify-between">
  <strong>Operations Dashboard</strong>
  <a href="/api/logout" class="underline">Logout</a>
</header>

<main class="max-w-7xl mx-auto p-6">

  <!-- STATS -->
  <section class="grid md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white p-4 shadow rounded text-center">
      <p class="text-gray-500">Active Shipments</p>
      <p class="text-2xl font-bold">—</p>
    </div>
    <div class="bg-white p-4 shadow rounded text-center">
      <p class="text-gray-500">Pending Reports</p>
      <p class="text-2xl font-bold text-red-600">—</p>
    </div>
    <div class="bg-white p-4 shadow rounded text-center">
      <p class="text-gray-500">Collections Today</p>
      <p class="text-2xl font-bold text-green-600">—</p>
    </div>
    <div class="bg-white p-4 shadow rounded text-center">
      <p class="text-gray-500">Active Branches</p>
      <p class="text-2xl font-bold">5</p>
    </div>
  </section>

  <!-- ROLE PANELS -->
  <section class="grid md:grid-cols-3 gap-6">
    <div class="bg-white p-6 shadow rounded">
      <h3 class="font-bold text-blue-900">Branch Manager</h3>
      <ul class="list-disc text-sm pl-4 mt-2">
        <li>Revenue per branch</li>
        <li>Daily reports</li>
      </ul>
    </div>

    <div class="bg-white p-6 shadow rounded">
      <h3 class="font-bold text-blue-900">Marketing</h3>
      <ul class="list-disc text-sm pl-4 mt-2">
        <li>Shipment monitoring</li>
        <li>Status updates</li>
      </ul>
    </div>

    <div class="bg-white p-6 shadow rounded">
      <h3 class="font-bold text-blue-900">Operations</h3>
      <ul class="list-disc text-sm pl-4 mt-2">
        <li>Terminal updates</li>
        <li>Documentation</li>
      </ul>
    </div>
  </section>

</main>

<!-- ROLE + DOMAIN ENFORCEMENT -->
<script type="module">
import { auth, db } from "/firebase.js";
import { getDoc, doc } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

auth.onAuthStateChanged(async (user) => {
  if (!user || !user.email.endsWith("@xtramile.ph")) {
    location.href = "/login.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists()) location.href = "/unauthorized.html";

  window.USER_ROLE = snap.data().role;
  window.USER_BRANCH = snap.data().branch;
});
</script>

</body>
</html>
