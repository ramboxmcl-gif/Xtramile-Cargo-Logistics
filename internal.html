<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>X‑TRA Mile Internal Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="/firebase.js"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-900 text-white p-4 flex justify-between">
  <strong>Operations Dashboard</strong>
  <a href="/api/logout" class="underline">Logout</a>
</header>

<main class="max-w-7xl mx-auto p-6">
  <section class="grid md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white p-4 shadow rounded text-center">Active Shipments</div>
    <div class="bg-white p-4 shadow rounded text-center">Pending Reports</div>
    <div class="bg-white p-4 shadow rounded text-center">Collections</div>
    <div class="bg-white p-4 shadow rounded text-center">Branches</div>
  </section>

  <section class="grid md:grid-cols-3 gap-6">
    <div class="bg-white p-6 shadow rounded">
      <h3 class="font-bold">Branch Manager</h3>
      <ul class="list-disc pl-4 text-sm mt-2">
        <li>Reports</li>
        <li>Revenue</li>
      </ul>
    </div>
    <div class="bg-white p-6 shadow rounded">
      <h3 class="font-bold">Marketing</h3>
      <ul class="list-disc pl-4 text-sm mt-2">
        <li>Tracking</li>
        <li>Updates</li>
      </ul>
    </div>
    <div class="bg-white p-6 shadow rounded">
      <h3 class="font-bold">Operations</h3>
      <ul class="list-disc pl-4 text-sm mt-2">
        <li>Terminal</li>
        <li>Documents</li>
      </ul>
    </div>
  </section>
</main>

<script type="module">
import { auth, db } from "/firebase.js";
import { getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

auth.onAuthStateChanged(async user => {
  if (!user || !user.email.endsWith("@xtramile.ph")) {
    location.href = "/login.html";
    return;
  }
  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists()) location.href = "/unauthorized.html";
});
</script>

</body>
</html>
