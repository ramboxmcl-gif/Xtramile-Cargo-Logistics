<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>X‑TRA Mile Cargo Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script type="module" src="/firebase.js"></script>
</head>

<body class="bg-gray-50">

<!-- NAV -->
<nav class="bg-blue-900 text-white p-4 flex justify-between">
  <strong>X‑TRA MILE</strong>
  <a href="#track" class="underline">Track Shipment</a>
</nav>

<!-- HERO -->
<section class="bg-blue-800 text-white text-center py-16">
  <h1 class="text-4xl font-bold">Making Things Possible…</h1>
  <p class="text-blue-200 mt-2">
    Nationwide & International Cargo Logistics
  </p>
</section>

<!-- PRESENTATION -->
<section class="py-12 bg-white text-center">
  <h2 class="text-3xl font-bold text-blue-900 mb-6">
    Company Presentation
  </h2>

  <div class="max-w-4xl mx-auto aspect-video shadow rounded overflow-hidden">
    <iframe class="w-full h-full"
      src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
      allowfullscreen></iframe>
  </div>
</section>

<!-- TRACKING -->
<section id="track" class="py-16 bg-gray-100">
  <div class="max-w-md mx-auto bg-white p-6 rounded shadow text-center">
    <h2 class="text-2xl font-bold text-blue-900 mb-4">
      Track Your Shipment
    </h2>

    <input id="tracking"
      placeholder="Enter Tracking Number"
      class="w-full border p-2 mb-4 rounded">

    <button onclick="track()"
      class="w-full bg-blue-900 text-white py-2 rounded">
      Track
    </button>

    <div id="result" class="mt-4 text-sm"></div>
  </div>
</section>

<footer class="bg-blue-900 text-white text-center p-4">
  © 2026 X‑TRA Mile Cargo Logistics
</footer>

<!-- TRACKING SCRIPT -->
<script type="module">
import { db } from "/firebase.js";
import { doc, getDoc } from
  "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.track = async () => {
  const id = tracking.value.trim();
  const snap = await getDoc(doc(db, "shipments", id));

  result.innerHTML = snap.exists()
    ? `<strong>Status:</strong> ${snap.data().status}<br>
       <strong>From:</strong> ${snap.data().origin}<br>
       <strong>To:</strong> ${snap.data().destination}`
    : "Shipment not found.";
};
</script>

</body>
</html>
